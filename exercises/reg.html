<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Semantic Analysis Quiz</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
 :root{
   --ok:#4caf50; --bad:#f44336; --border:#bbb;
   --bg:#fafafa; --fg:#222; --accent:#1565c0;
 }
 body{font-family:system-ui,Segoe UI,Roboto,sans-serif;margin:0;background:var(--bg);color:var(--fg);}
 header{padding:1rem;background:var(--accent);color:#fff;text-align:center;}
 main{padding:1rem;max-width:820px;margin:auto;}
 h2{margin-top:2rem;color:var(--accent);}
 .q{padding:1rem;border:1px solid var(--border);border-radius:6px;margin-bottom:.8rem;background:#fff; transition: background 0.3s;}
 .q.correct{border-color:var(--ok);background:#f1f8f4;}
 .q.wrong  {border-color:var(--bad);background:#fef5f5;}
 label.option-label{display:block;padding:.4rem 0;cursor:pointer; transition: color 0.2s;}
 button{padding:.6rem 1rem;margin:1.5rem 0;font-size:1rem;border:none;border-radius:4px;background:var(--accent);color:#fff;cursor:pointer; transition: background 0.3s;}
 .check-btn { padding: 0.4rem 0.8rem; margin: 0.5rem 0 0 0; font-size: 0.9rem; }
 button:hover:not(:disabled){background:#0d47a1;}
 button:disabled{opacity:.6;cursor:not-allowed;}
 #result{font-weight:bold;font-size:1.1rem;margin-top:1rem;padding:1rem;border-radius:4px; display:none;}
 #result.show{display:block; background:#e3f2fd;border:1px solid var(--accent);}
 footer{padding:1rem;text-align:center;font-size:.85rem;color:#555;}
 
 /* 新增：代码块与解析的样式 */
 code { background: #eee; padding: 2px 5px; border-radius: 4px; color: #d63384; font-family: monospace; }
 .explanation {
   display: none;
   margin-top: 0.2rem;
   margin-bottom: 0.8rem;
   padding: 0.6rem;
   background-color: #f9f9f9;
   border-left: 3px solid var(--accent);
   font-size: 0.9rem;
   color: #444;
   white-space: pre-wrap; /* 保留文本中的换行符 */
 }
 .explanation.show {
   display: block;
   animation: fadeIn 0.4s ease;
 }
 @keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }
 @media(max-width:500px){body{font-size:15px;}}
</style>

<!-- 引入 MathJax 以支持类似于 $\sigma_1$ 的 LaTeX 公式渲染 -->
<script>
  MathJax = {
    tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] }
  };
</script>
<script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
</head>
<body>
<header><h1>Semantic Analysis – Self-Check Quiz</h1></header>
<main>
  <section id="mcq"><h2>Multiple Choice</h2></section>
  <div id="result"></div>
</main>
<footer>
  <p>Based on "Semantic Analysis" chapter. © 2026</p>
  <p style="margin-top: 1rem; font-size: 0.85rem;">
    📖 源码与贡献题目请访问：<a href="https://github.com/rainoftime/tiger/tree/main/exercises" target="_blank" style="color: var(--accent); text-decoration: none;">GitHub Exercises</a>
  </p>
</footer>

<script>
const mcqWrap = document.getElementById('mcq');
const resultBox = document.getElementById('result');

// 格式化文本：将反引号包裹的文本转换为 HTML 的 <code> 标签
function formatText(text) {
  if(!text) return "";
  return text.replace(/`([^`]+)`/g, '<code>$1</code>');
}

// build multiple choice element
function buildMCQ(q, i){
  const div=document.createElement('div');
  div.className='q';
  div.dataset.correct=q.answer; // store index
  let optionsHTML='';
  
  q.options.forEach((opt, idx) => {
    // 只有当有解析时才渲染解析 div
    const expHTML = opt.explanation ? `<div class="explanation">${formatText(opt.explanation)}</div>` : '';
    optionsHTML += `
      <label class="option-label" id="lbl-${i}-${idx}">
        <input type="radio" name="mc${i}" value="${idx}">
        <span class="opt-text">${formatText(opt.text)}</span>
      </label>
      ${expHTML}
    `;
  });
  
  div.innerHTML=`<strong>Q${i+1}.</strong> ${formatText(q.question)}<br><div style="margin-top:0.8rem;">${optionsHTML}</div>
                 <button class="check-btn" id="btn-${i}">Check Answer / 查看解析</button>`;
  return div;
}

// 每道题单独的判定逻辑
function gradeQuestion(div, qIndex, btn) {
  const correctIdx = parseInt(div.dataset.correct);
  const sel = div.querySelector('input[type=radio]:checked');
  
  // 如果没有选择，设定 selectedIdx 为 -1，不再拦截弹窗
  const selectedIdx = sel ? parseInt(sel.value) : -1;
  
  // 判断对错（未作答视为错误）
  if(selectedIdx === correctIdx){
    div.classList.add('correct');
  }else{
    div.classList.add('wrong');
  }
  
  // 显示解析
  div.querySelectorAll('.explanation').forEach(exp => exp.classList.add('show'));
  
  // 高亮选项颜色（正确答案标绿加粗，选错的标红）
  div.querySelectorAll('.option-label').forEach((lbl, idx) => {
    const radio = lbl.querySelector('input');
    radio.disabled = true; // 提交后禁用选项
    
    // 增加 padding 以适应背景色高亮
    lbl.style.padding = '0.4rem 0.5rem';
    lbl.style.borderRadius = '4px';
    
    if (idx === correctIdx) {
      lbl.style.color = '#2e7d32';
      lbl.style.fontWeight = 'bold';
      lbl.style.backgroundColor = '#e8f5e9'; // 浅绿色背景
      lbl.querySelector('.opt-text').innerHTML += ' ✅';
    } else if (idx === selectedIdx && selectedIdx !== correctIdx) {
      lbl.style.color = '#c62828';
      lbl.style.fontWeight = 'bold';
      lbl.style.backgroundColor = '#ffebee'; // 浅红色背景
      lbl.querySelector('.opt-text').innerHTML += ' ❌';
    }
  });
  
  btn.disabled = true;
  btn.textContent = 'Answered (已显示解析)';
  
  checkAllFinished();
}

// 检查是否所有题目均已作答，完成后显示总分
function checkAllFinished() {
  const total = quizData.multipleChoice.length;
  const answered = document.querySelectorAll('.q.correct, .q.wrong').length;
  if (answered === total) {
    const correct = document.querySelectorAll('.q.correct').length;
    resultBox.innerHTML = `All Answered! Final Score (您的总成绩): ${correct} / ${total} (${Math.round(correct/total*100)}%)`;
    resultBox.classList.add('show');
  }
}

// 将您的 sem.txt 数据结构化
const quizData = {
  trueFalse: [
    {
      question: "If a graph is K-colorable, it is always possible to find a K-coloring using the Simplify heuristic alone.",
      options: [
        {text:"True", explanation:"Some colorable graphs may only have nodes of degree ≥K at certain points, requiring the Spill heuristic to move forward."},
        {text:"False", explanation:"正确答案\nThe Simplify heuristic only works if there is always a node with degree <K; more complex graphs may be K-colorable but require more sophisticated search."}
      ],
      answer: 1
    },
    {
      question: "Coalescing can sometimes make a previously colorable graph uncolorable.",
      options: [
        {text:"True", explanation:"正确答案\nAggressive or 'reckless' coalescing can increase the degree of a node by combining the neighbor sets of two nodes, potentially causing a spill."},
        {text:"False", explanation:"Because the new node is the union of the edges of the two original nodes, it is more constrained and can indeed make the graph uncolorable."}
      ],
      answer: 0
    },
    {
      question: "A MOVE instruction can be deleted if its source and destination are assigned to the same register.",
      options: [
        {text:"True", explanation:"正确答案\nA MOVE between the same register (e.g., r1←r1) is a no-op and can be safely removed by the compiler."},
        {text:"False", explanation:"The primary goal of coalescing and biased coloring is to ensure this exact condition so the instruction can be removed."}
      ],
      answer: 0
    },
    {
      question:"Spilled nodes can never be coalesced with each other because they reside in memory.",
      options: [
        {text:"True", explanation:"The algorithm can aggressively coalesce spilled nodes to share stack frame locations, as there is no fixed limit on the number of locations."},
        {text:"False", explanation:"正确答案\nAggressive coalescing of spills is recommended to reduce the size of the stack frame and eliminate unnecessary fetch/store sequences."}
      ],
      answer: 1
    },
    {
      question:"A node is considered 'move-related' if it is the source or destination of a MOVE instruction that has not yet been coalesced or frozen.",
      options: [
        {text:"True", explanation:"正确答案\nBeing 'move-related' dictates which work-list a node belongs to and whether it can be processed by the Simplify or Coalesce phases."},
        {text:"False", explanation:"Once a move is coalesced, frozen, or constrained, it no longer makes its associated nodes 'move-related'."}
      ],
      answer: 0
    },
    {
      question: "When a node is marked for 'potential spill', it is immediately removed from the graph and pushed onto the select stack.",
      options: [
        {text:"True", explanation:"正确答案\nThis allows the simplification process to continue; the 'potential' part means it might still be colored later."},
        {text:"False", explanation:"Removing it from the graph is the standard procedure to reduce the graph's complexity and resume simplification."}
      ],
      answer: 0
    },
    {
      question: "A callee-save register is typically preserved by moving it to a fresh temporary at the start of a procedure.",
      options: [
        {text:"True", explanation:"正确答案\nThis allows the register allocator to decide whether to keep it in a register or spill it to memory based on register pressure."},
        {text:"False", explanation:"If pressure is low, the temporary is coalesced back to the register, effectively eliminating the MOVE."}
      ],
      answer: 0
    },
    {
      question: "In the implementation of the graph coloring algorithm, adjacency lists for precolored nodes should be explicitly represented to ensure safety.",
      options: [
        {text:"True", explanation:"Representing these lists is inefficient because precolored nodes interfere with many temporaries; George's test avoids the need for these lists."},
        {text:"False", explanation:"正确答案\nTo save space and time, the adjacency lists of machine registers are often omitted, as they are not needed for the Select phase."}
      ],
      answer: 1
    },
    {
      question: "A node x transitions from the 'spillWorklist' to the 'simplifyWorklist' if its degree is decremented from K to K−1.",
      options: [
        {text:"True", explanation:"正确答案\nWhen its degree becomes insignificant (<K), it becomes a candidate for simplification (provided it is not move-related)."},
        {text:"False", explanation:"A node with degree K−1 is by definition of insignificant degree and should be moved out of the spill work-list."}
      ],
      answer: 0
    },
    {
      question: "If two nodes are move-related, they can only be coalesced using the George criterion if one of them is precolored.",
      options: [
        {text:"True", explanation:"George's criterion can be used for any pair, but it is specifically useful for coalescing with precolored nodes since it doesn't require the precolored node's adjacency list."},
        {text:"False", explanation:"正确答案\nBoth Briggs and George are general safe coalescing strategies, although they have different implementation advantages."}
      ],
      answer: 1
    },
    {
      question:" In the Sethi-Ullman algorithm, 'trivial' nodes (like constants or existing registers) have a need value of 0.",
      options:[
        {text:"True", explanation:"正确答案\nTrivial nodes are already in registers or are immediate values, so they don't consume additional registers to 'evaluate' their subtree."},
        {text:"False", explanation:"Algorithm 11.10 in textbook explicitly sets `need[t] \leftarrow 0` if `t` is trivial."}
      ],
      answer: 0
    },
    {
      question: "In a graph-coloring allocator, any variable that is not live across any procedure call should ideally be allocated to a caller-save register.",
      options: [
        {text:"True", explanation:"正确答案\nUsing a caller-save register for a value that doesn't survive a call avoids the need to save/restore any registers at the procedure boundaries."},
        {text:"False", explanation:"This is a standard optimization goal that the interference graph handles by making caller-save registers interfere with anything live across a call."}
      ],
      answer: 0
    }
  ],
  multipleChoice: [
    {
      question: "In the context of register allocation, what does an interference graph node represent?",
      options: [
        {text:"A. A MOVE instruction", explanation:"MOVE instructions are typically represented as edges (often dotted) or managed in move-related work-lists, not as the nodes themselves."},
        {text:"B. A basic block", explanation:"Basic blocks are components of the control-flow graph, which is analyzed to derive the interference graph."},
        {text:"C. A temporary value", explanation:"正确答案\nThe interference graph is built where each node corresponds to a temporary that needs to be assigned to a register."},
        {text:"D. A machine register", explanation:"Machine registers are represented by precolored nodes, but a general node in the interference graph typically represents a temporary value."}
      ],
      answer: 2
    },
    {
      question: "Under what condition does an edge (t1,t2) exist in the interference graph?",
      options: [
        {text:"A. When t1 and t2 are both used in the same instruction", explanation:"Being used together doesn't prevent sharing a register; the critical issue is whether they are both needed simultaneously."},
        {text:"B. When t1 is the source and t2 is the destination of a MOVE", explanation:"A MOVE instruction suggests the nodes could potentially be the same register, not that they must be different."},
        {text:"C. When t1 is defined before t2 is used", explanation:"Sequential definitions and uses do not necessarily create interference unless the live ranges overlap."},
        {text:"D. When t1 and t2 are live at the same time", explanation:"正确答案\nLiveness overlap means the values coexist and cannot occupy the same physical register without corrupting data."}
      ],
      answer: 3
    },
    {
      question: "Which phase of the register allocation algorithm is responsible for removing non-move-related nodes with degree less than K?",
      options: [
        {text:"A. Select", explanation:"Select is the phase where nodes are popped from the stack and actually assigned colors."},
        {text:"B. Build", explanation:"The Build phase is responsible for constructing the initial interference graph and identifying move-related nodes."},
        {text:"C. Coalesce", explanation:"Coalesce attempts to merge move-related nodes to eliminate redundant MOVE instructions."},
        {text:"D. Simplify", explanation:"正确答案\nSimplify uses a heuristic to remove nodes that are guaranteed to be colorable given a K-coloring of the remaining graph."}
      ],
      answer: 3
    },
    {
      question: "What happens if the 'Select' phase discovers a node that cannot be assigned any of the K colors because its neighbors use all of them?",
      options: [
        {text:"A. The node is frozen and returned to the work-list", explanation:"Freezing happens during the reduction phase to enable more simplification, not during the coloring phase."},
        {text:"B. The algorithm terminates with an error", explanation:"The algorithm is designed to handle this situation by rewriting the program and retrying."},
        {text:"C. An actual spill occurs", explanation:"正确答案\nWhen a potential spill node cannot be colored during Select, it becomes an actual spill, requiring memory allocation."},
        {text:"D. The node is automatically assigned to a caller-save register", explanation:"If all colors (registers) are taken by neighbors, no register—caller-save or callee-save—is available."}
      ],
      answer: 2
    },
    {
      question: "According to the Briggs coalescing criterion, when can nodes a and b be safely coalesced?",
      options: [
        {text:"A. If the combined node ab has fewer than K neighbors of significant degree", explanation:"正确答案\nBriggs ensures safety because all insignificant-degree neighbors will be simplified away, leaving ab with fewer than K neighbors."},
        {text:"B. If a and b do not interfere", explanation:"Non-interference is a prerequisite for any coalescing, but the Briggs criterion adds specific constraints to ensure colorability."},
        {text:"C. If every neighbor of a is already a neighbor of b", explanation:"不太对\nThis is a characteristic that might simplify the graph but is not the specific heuristic defined by Briggs."},
        {text:"D. If a is move-related and b is precolored", explanation:"While precolored nodes can be coalesced, the Briggs criterion focuses on the degree of the resulting node."}
      ],
      answer: 0
    },
    {
      question: "Which of the following describes George's criterion for coalescing nodes a and b (where u is precolored)?",
      options: [
        {text:"A. The move instruction between u and v must be inside a loop", explanation:"Coalescing is beneficial everywhere, though loop context might influence spill costs, not coalescing safety."},
        {text:"B. For every neighbor t of v, either t interferes with u or t is of insignificant degree", explanation:"正确答案\nThis ensures that after simplifying insignificant nodes, the remaining neighbors of v are already neighbors of u, making the graph no harder to color."},
        {text:"C. The combined node has degree <K", explanation:"This is a simpler, more aggressive test than the one George proposed."},
        {text:"D. The node v must have a lower spill priority than u", explanation:"Spill priority is used in the Spill phase, not in the conservative coalescing criteria."}
      ],
      answer: 1
    },
    {
      question: "How are precolored nodes (machine registers) treated during the Simplify phase?",
      options: [
        {text:"A. They are treated as having infinite degree and are never simplified or spilled", explanation:"正确答案\nSince registers cannot be spilled and their colors cannot be changed, the algorithm must treat them as always present."},
        {text:"B. They are removed from the graph during the Build phase", explanation:"They must remain in the graph to represent interferences with other temporaries."},
        {text:"C. They are treated as low-degree nodes to encourage coalescing", explanation:"They often have very high degrees because they interfere with many temporaries live across procedure calls."},
        {text:"D. They are simplified first because they have fixed colors", explanation:"Simplifying a precolored node would mean removing it from the graph to be colored later, but its color is already fixed."}
      ],
      answer: 0
    },
    {
      question: "When evaluates a node with two children $u_{left}$ and $u_{right}$ in an expression tree, how does Sethi-Ullman decide the order of evaluation?",
      options: [
        {text:"A. It evaluates the child with the lower need value first", explanation:"If you evaluate the lower-need child first, you must hold its result while evaluating the higher-need child, likely increasing peak register usage."},
        {text:"B. It always evaluates the left child first to maintain left-to-right semantics", explanation:"The algorithm reorders evaluation specifically to minimize register usage, potentially violating simple left-to-right order."},
        {text:"C. It evaluates the child with the higher need value first", explanation:"正确答案\nEvaluating the more 'expensive' subtree first minimizes the total registers held simultaneously while evaluating the second subtree."},
        {text:"D. It evaluates them in parallel if possible", explanation:"Sethi-Ullman is a sequential evaluation algorithm for a single processor's registers."}
      ],
      answer: 2
    },
    {
      question: "If a variable is live across a procedure call, which registers will it typically interfere with?",
      options:[
        {text:"A. No registers, as it must be spilled to the stack frame", explanation:"It can be allocated to a callee-save register, which is preserved across the call."},
        {text:"B. Only callee-save registers", explanation:"It also interferes with caller-save registers because the call itself is considered to define all caller-save registers."},
        {text:"C. All caller-save registers", explanation:"正确答案\nThe allocator models procedure calls as defining all caller-save registers, forcing values live across calls to avoid them."},
        {text:"D. Only the frame pointer and stack pointer", explanation:"While it might interfere with those, the critical interferences for allocation are the general-purpose caller-save registers."}
      ],
      answer: 2
    },
    {
      question: "When a node is spilled, the program is rewritten to include fetches and stores. What is a key property of the new temporaries created for these fetches and stores?",
      options: [
        {text:"A. They have tiny live ranges", explanation:"正确答案\nSmall live ranges reduce the chance of further interference, helping the next iteration of coloring succeed."},
        {text:"B. They do not interfere with any other nodes", explanation:"They still interfere with any other variables that happen to be live at those specific instructions."},
        {text:"C. They have very long live ranges", explanation:"They are designed to be short-lived, existing only between the fetch/store and the immediate use/def."},
        {text:"D. They are automatically precolored", explanation:"They are still temporaries and must go through the coloring process, though they are much easier to color."}
      ],
      answer: 0
    },
    {
      question: "In the Sethi-Ullman algorithm, if a node has two children with requirements n and m, and n=m, what is the register requirement for the parent node?",
      options: [
        {text:"A. n", explanation:"If you evaluate one child, you must use one register to hold its result while evaluating the other, which itself requires n registers."},
        {text:"B. K", explanation:"K is the machine's total register count, which is a constraint but not the calculated 'need' for the node."},
        {text:"C. n+1", explanation:"正确答案\nWhen n=m, the parent requires n+1 registers because one register must hold the result of the first subtree while the second subtree is being evaluated."},
        {text:"D. 2n", explanation:"The subtrees are evaluated sequentially, so you only need to add one to the peak requirement of a single subtree."}
      ],
      answer: 2
    },
    {
      question: "What is the result of 'constraining' a move?",
      options: [
        {text:"A. The program crashes", explanation:"Constraining is a normal part of the algorithm's bookkeeping for move-related nodes."},
        {text:"B. The move is removed from consideration for coalescing", explanation:"正确答案\nWhen source and destination interfere, the move is 'constrained' and no longer makes the nodes move-related."},
        {text:"C. The nodes are forced to have different colors", explanation:"They already interfere, so the interference graph already forces them to have different colors."},
        {text:"D. The move is successfully coalesced", explanation:"Constraining happens precisely because the nodes *cannot* be coalesced due to existing interference."}
      ],
      answer: 1
    },

    {
      question: "When does the algorithm perform 'Liveness Analysis'?",
      options: [
        {text:"A. At the start of each iteration of the Main loop", explanation:"正确答案\nBecause spilling adds new temporaries and instructions, liveness must be re-calculated to build a correct interference graph."},
        {text:"B. Continuously during the Simplify phase", explanation:"The Simplify phase works on the static graph built once liveness is complete; it doesn't re-run the full analysis."},
        {text:"C. Only at the very beginning of the compilation process", explanation:"It must be repeated if the program is rewritten to include spill instructions."},
        {text:"D. Only after the Select phase fails", explanation:"It is done *before* building the graph, which precedes the Select phase."}
      ],
      answer: 0
    },
    {
      question: "Which heuristic is used to choose which node to spill when no low-degree nodes are available?",
      options: [
        {text:"A. Pick the node with the highest degree", explanation:"Degree is only part of the equation; we must also consider how often the variable is used."},
        {text:"B. Pick a precolored node", explanation:"Precolored nodes (machine registers) cannot be spilled."},
        {text:"C. Pick the node with the lowest 'spill priority'", explanation:"正确答案\nPriority is typically calculated as (uses + defs) / degree, often weighted by loop depth, to minimize the cost of the spill."},
        {text:"D. Pick the node that was most recently added to the graph", explanation:"The order of addition is irrelevant; only the interference and usage patterns matter."}
      ],
      answer: 2
    },
    {
      question: "How does the algorithm handle a MOVE instruction between two nodes that already interfere?",
      options: [
        {text:"A. It spills both nodes immediately", explanation:"Interference and moves coexist frequently; it's not an error or a trigger for spilling."},
        {text:"B. It merges them into a single node to resolve the conflict", explanation:"Nodes that interfere *cannot* be merged, as they must reside in different registers."},
        {text:"C. It marks the move as 'constrained'", explanation:"正确答案\nConstraining the move means we acknowledge it cannot be eliminated by coalescing, so it is removed from the worklistMoves."},
        {text:"D. It ignores the interference and coalesces them anyway", explanation:"This would be 'reckless' and result in an incorrect program where two values occupy the same register simultaneously."}
      ],
      answer: 2
    },
    {
      question: "What is the recommended approach for a machine with many registers (e.g., > 20) regarding spilled nodes?",
      options:[
          {text:"A. Spill nodes as early as possible to simplify the graph", explanation:"Early spilling is inefficient; you should always try to color nodes first."},
          {text:"B. Disable the coalescing phase entirely", explanation:"Coalescing is still vital for registers to remove MOVE instructions."},
          {text:"C. Precolor the spill locations", explanation:"Spill locations are memory addresses, not registers, so they shouldn't be precolored in the interference graph."},
          {text:"D. Coalesce spilled nodes aggressively", explanation:"正确答案\nSince stack space is 'infinite' compared to registers, you can merge spill locations without fearing you will run out of 'colors'."}
      ],
      answer: 3
    }
  ]
};
// 动态构建界面
let globalCounter = 0;

// 1. 渲染判断题
quizData.trueFalse.forEach((q, i) => {
  const qDiv = buildMCQ(q, globalCounter, `T/F ${i+1}`);
  tfWrap.appendChild(qDiv);
  
  const btn = qDiv.querySelector(`#btn-${globalCounter}`);
  const currentCounter = globalCounter;
  btn.addEventListener('click', () => gradeQuestion(qDiv, currentCounter, btn));
  globalCounter++;
});

// 2. 渲染单选题
quizData.multipleChoice.forEach((q, i) => {
  const qDiv = buildMCQ(q, globalCounter, `Q${i+1}`);
  mcqWrap.appendChild(qDiv);
  
  const btn = qDiv.querySelector(`#btn-${globalCounter}`);
  const currentCounter = globalCounter;
  btn.addEventListener('click', () => gradeQuestion(qDiv, currentCounter, btn));
  globalCounter++;
});
</script>
