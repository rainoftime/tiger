<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Compiler Design Quiz</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
 :root{
   --ok:#4caf50; --bad:#f44336; --border:#bbb;
   --bg:#fafafa; --fg:#222; --accent:#1565c0;
 }
 body{font-family:system-ui,Segoe UI,Roboto,sans-serif;margin:0;background:var(--bg);color:var(--fg);}
 header{padding:1rem;background:var(--accent);color:#fff;text-align:center;}
 main{padding:1rem;max-width:820px;margin:auto;}
 h2{margin-top:2rem;color:var(--accent); border-bottom: 2px solid #eee; padding-bottom: 0.5rem;}
 .q{padding:1rem;border:1px solid var(--border);border-radius:6px;margin-bottom:.8rem;background:#fff; transition: background 0.3s;}
 .q.correct{border-color:var(--ok);background:#f1f8f4;}
 .q.wrong  {border-color:var(--bad);background:#fef5f5;}
 label.option-label{display:block;padding:.4rem 0;cursor:pointer; transition: color 0.2s;}
 button{padding:.6rem 1rem;margin:1.5rem 0;font-size:1rem;border:none;border-radius:4px;background:var(--accent);color:#fff;cursor:pointer; transition: background 0.3s;}
 .check-btn { padding: 0.4rem 0.8rem; margin: 0.5rem 0 0 0; font-size: 0.9rem; }
 button:hover:not(:disabled){background:#0d47a1;}
 button:disabled{opacity:.6;cursor:not-allowed;}
 #result{font-weight:bold;font-size:1.1rem;margin-top:1rem;padding:1rem;border-radius:4px; display:none;}
 #result.show{display:block; background:#e3f2fd;border:1px solid var(--accent);}
 footer{padding:1rem;text-align:center;font-size:.85rem;color:#555;}
 
 /* 代码块与解析的样式 */
 code { background: #eee; padding: 2px 5px; border-radius: 4px; color: #d63384; font-family: monospace; }
 .explanation {
   display: none;
   margin-top: 0.2rem;
   margin-bottom: 0.8rem;
   padding: 0.6rem;
   background-color: #f9f9f9;
   border-left: 3px solid var(--accent);
   font-size: 0.9rem;
   color: #444;
   white-space: pre-wrap; /* 保留文本中的换行符 */
 }
 .explanation.show {
   display: block;
   animation: fadeIn 0.4s ease;
 }
 @keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }
 @media(max-width:500px){body{font-size:15px;}}
</style>

<!-- 引入 MathJax 以支持类似于 $\sigma_1$ 的 LaTeX 公式渲染 -->
<script>
  MathJax = {
    tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] }
  };
</script>
<script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
</head>
<body>
<header><h1>Compiler Design – Self-Check Quiz</h1></header>
<main>
  <section id="tf"><h2>True / False</h2></section>
  <section id="mcq"><h2>Multiple Choice</h2></section>
  <div id="result"></div>
</main>
<footer>
  <p>Based on Compiler Design chapters. © 2026</p>
  <p style="margin-top: 1rem; font-size: 0.85rem;">
    📖 源码与贡献题目请访问：<a href="https://github.com/rainoftime/tiger/tree/main/exercises" target="_blank" style="color: var(--accent); text-decoration: none;">GitHub Exercises</a>
  </p>
</footer>

<script>
const tfWrap = document.getElementById('tf');
const mcqWrap = document.getElementById('mcq');
const resultBox = document.getElementById('result');

// 格式化文本：将反引号包裹的文本转换为 HTML 的 <code> 标签
function formatText(text) {
  if(!text) return "";
  return text.replace(/`([^`]+)`/g, '<code>$1</code>');
}

// build multiple choice / TF element
function buildMCQ(q, globalIdx, labelPrefix = "Q"){
  const div = document.createElement('div');
  div.className = 'q';
  div.dataset.correct = q.answer; // store index
  let optionsHTML = '';
  
  q.options.forEach((opt, idx) => {
    // 只有当有解析时才渲染解析 div
    const expHTML = opt.explanation ? `<div class="explanation">${formatText(opt.explanation)}</div>` : '';
    optionsHTML += `
      <label class="option-label" id="lbl-${globalIdx}-${idx}">
        <input type="radio" name="q${globalIdx}" value="${idx}">
        <span class="opt-text">${formatText(opt.text)}</span>
      </label>
      ${expHTML}
    `;
  });
  
  div.innerHTML=`<strong>${labelPrefix}.</strong> ${formatText(q.question)}<br><div style="margin-top:0.8rem;">${optionsHTML}</div>
                 <button class="check-btn" id="btn-${globalIdx}">Check Answer / 查看解析</button>`;
  return div;
}

// 每道题单独的判定逻辑
function gradeQuestion(div, qIndex, btn) {
  const correctIdx = parseInt(div.dataset.correct);
  const sel = div.querySelector('input[type=radio]:checked');
  
  // 如果没有选择，设定 selectedIdx 为 -1
  const selectedIdx = sel ? parseInt(sel.value) : -1;
  
  // 判断对错（未作答视为错误）
  if(selectedIdx === correctIdx){
    div.classList.add('correct');
  }else{
    div.classList.add('wrong');
  }
  
  // 显示解析
  div.querySelectorAll('.explanation').forEach(exp => exp.classList.add('show'));
  
  // 高亮选项颜色（正确答案标绿加粗，选错的标红）
  div.querySelectorAll('.option-label').forEach((lbl, idx) => {
    const radio = lbl.querySelector('input');
    radio.disabled = true; // 提交后禁用选项
    
    // 增加 padding 以适应背景色高亮
    lbl.style.padding = '0.4rem 0.5rem';
    lbl.style.borderRadius = '4px';
    
    if (idx === correctIdx) {
      lbl.style.color = '#2e7d32';
      lbl.style.fontWeight = 'bold';
      lbl.style.backgroundColor = '#e8f5e9'; // 浅绿色背景
      lbl.querySelector('.opt-text').innerHTML += ' ✅';
    } else if (idx === selectedIdx && selectedIdx !== correctIdx) {
      lbl.style.color = '#c62828';
      lbl.style.fontWeight = 'bold';
      lbl.style.backgroundColor = '#ffebee'; // 浅红色背景
      lbl.querySelector('.opt-text').innerHTML += ' ❌';
    }
  });
  
  btn.disabled = true;
  btn.textContent = 'Answered (已显示解析)';
  
  checkAllFinished();
}

// 检查是否所有题目均已作答，完成后显示总分
function checkAllFinished() {
  const total = quizData.trueFalse.length + quizData.multipleChoice.length;
  const answered = document.querySelectorAll('.q.correct, .q.wrong').length;
  if (answered === total) {
    const correct = document.querySelectorAll('.q.correct').length;
    resultBox.innerHTML = `All Answered! Final Score (您的总成绩): ${correct} / ${total} (${Math.round(correct/total*100)}%)`;
    resultBox.classList.add('show');
  }
}

// 数据结构化 (新增了 True/False 和 指令选择 的多选题)
const quizData = {
  trueFalse: [
    {
      question: "The use of an Intermediate Representation (IR) requires a compiler designer to implement N⋅M components when supporting N source languages and M target machines.",
      options: [
        { text: "True", explanation: "This represents the complexity without an IR; an IR reduces the task to N front ends and M back ends (N+M)." },
        { text: "False", explanation: "正确答案\nAn IR allows the compiler to be modular, requiring only N front ends and M back ends to support all combinations." }
      ],
      answer: 1
    },
    {
      question: "In the abstract machine, the number of available temporaries (TEMP) is limited to the number of physical registers on the target processor.",
      options: [
        { text: "True", explanation: "While real machines have limited registers, the abstract IR machine assumes an infinite supply to simplify early translation." },
        { text: "False", explanation: "正确答案\nThe abstract machine is defined to have an infinite number of temporaries, which are later mapped to physical registers." }
      ],
      answer: 1
    },
    {
      question: "The Tree IR operator MEM(e) can represent both a memory load and a memory store operation depending on its position in a MOVE statement.",
      options: [
        { text: "True", explanation: "正确答案\nWhen MEM is the left child of a MOVE, it denotes a store; elsewhere, it denotes a fetch." },
        { text: "False", explanation: "The IR is designed so that MEM acts as an l-value on the left of an assignment and an r-value otherwise." }
      ],
      answer: 0
    },
    {
      question: "Tiger language array variables behave like pointers, meaning array assignment does not copy the elements of the array.",
      options: [
        { text: "True", explanation: "正确答案\nIn Tiger, as in Java, array variables are scalars (pointers), and assignment simply makes two variables point to the same memory." },
        { text: "False", explanation: "Unlike Pascal, which might copy entire contents, Tiger treats arrays as reference types." }
      ],
      answer: 0
    },
    {
      question: "The Tree IR language includes a specific unary operator for integer negation.",
      options: [
        { text: "True", explanation: "The text states the Tree language has no unary arithmetic operators; negation is implemented via subtraction from zero." },
        { text: "False", explanation: "正确答案\nUnary negation is typically implemented as 0−x using the BINOP MINUS operator." }
      ],
      answer: 1
    },
    {
      question: "True or False: A CJUMP instruction in the Tree IR always 'falls through' to the next instruction if the condition is false.",
      options: [
        { text: "True", explanation: "CJUMP is defined with explicit labels for both the true and false destinations, ensuring it never simply falls through." },
        { text: "False", explanation: "正确答案\nThe IR definition of CJUMP requires two destination labels, one for true and one for false." }
      ],
      answer: 1
    },
    {
      question: "Static links are used to access variables declared in the stack frame of the currently executing function.",
      options: [
        { text: "True", explanation: "Local variables in the current frame are accessed via the frame pointer; static links are for accessing variables in outer scopes." },
        { text: "False", explanation: "正确答案\nStatic links are necessary specifically when a function needs to access variables from an outer-nested scope." }
      ],
      answer: 1
    },
    {
      question: "Record creation in Tiger involves allocating memory on the stack to ensure the record is automatically freed when the function returns.",
      options: [
        { text: "True", explanation: "Records in Tiger may outlive the procedure that creates them, so they must be allocated on the heap." },
        { text: "False", explanation: "正确答案\nRecords and strings are heap-allocated because their lifetimes are not strictly tied to the stack-based activation records." }
      ],
      answer: 1
    }
  ],
  multipleChoice: [
    {
      question: "In the context of the Tree IR, what is the primary purpose of the $ESEQ(s,e)$ expression?",
      options: [
        { text: "A. To jump to a label if a specific expression evaluates to true.", explanation: "This describes the CJUMP operator, which is a statement, not an expression." },
        { text: "B. To define a sequence of two statements that return no value.", explanation: "That describes the SEQ operator, which combines two statements (T_stm)." },
        { text: "C. To evaluate a statement for side effects before computing a result from an expression.", explanation: "正确答案\nThis allows the IR to include mandatory actions (like an assignment or jump) within a value-producing context." },
        { text: "D. To allocate memory for a new record on the heap.", explanation: "While ESEQ might be part of the allocation code, it is a general-purpose control-flow operator." }
      ],
      answer: 2
    },
    {
      question: "When translating a 'simple variable' located in the current stack frame, which components are typically used to construct the Tree IR?",
      options: [
        { text: "A. A chain of MEM nodes following static links.", explanation: "This is only required for variables in outer scopes, not those in the current frame." },
        { text: "B. A CALL to a runtime system function.", explanation: "Accessing a simple local variable is a direct memory operation and does not require a function call." },
        { text: "C. MEM(+(TEMP FP,CONST k))", explanation: "正确答案\nLocal variables are accessed by adding a known offset (k) to the frame pointer (FP) and fetching from that address." },
        { text: "D. A NAME node and a constant offset.", explanation: "NAME refers to symbolic constants or assembly labels, not stack-relative addresses." }
      ],
      answer: 2
    },
    {
      question: "What happens when a CALL expression is evaluated in the Tree IR?",
      options: [
        { text: "A. The arguments are evaluated from right to left before the function expression.", explanation: "The text specifies that the function subexpression f is evaluated first, then arguments from left to right." },
        { text: "B. The return value is immediately discarded.", explanation: "A CALL is an expression (T_exp); its result is the return value of the function." },
        { text: "C. All arguments are moved into physical registers before the function address is determined.", explanation: "The IR defines the order of evaluation; moving into registers is a back-end/calling convention detail." },
        { text: "D. The function subexpression is evaluated first, followed by the arguments from left to right.", explanation: "正确答案\nThis defines a strict evaluation order to handle potential side effects in the arguments." }
      ],
      answer: 3
    },
    {
      question: "In a function definition, which component is responsible for saving 'escaping' arguments and callee-save registers?",
      options: [
        { text: "A. The unCx conversion function.", explanation: "unCx is used for Boolean logic, not for the low-level setup of function activation records." },
        { text: "B. The BINOP operator.", explanation: "BINOP performs arithmetic or logical operations within expressions." },
        { text: "C. The Prologue.", explanation: "正确答案\nThe prologue sets up the environment for the function body, including saving necessary registers and the return address." },
        { text: "D. The Epilogue.", explanation: "The epilogue restores registers and cleans up; it does not save them initially." }
      ],
      answer: 2
    }, 
    {
      question: "What is the primary difference between a $exp$ and a $stm$ in the tree language?",
      options: [
        { text: "A. $exp$ handles memory stores, while $stm$ only handles memory fetches.", explanation: "The MEM node is an expression used for fetches, but it can represent a store when it is the left child of a $MOVE$ statement." },
        { text: "B. $stm$ can be a sub-component of a $exp$, but not vice versa.", explanation: "In fact, the ESEQ expression can contain a statement, and the EXP statement contains an expression." },
        { text: "C. $exp$ represents the computation of a value, while $stm$ performs side effects or control flow.", explanation: "正确答案\nExpressions return results that can be used by other nodes, whereas statements are executed for their actions like moving data or jumping." },
        { text: "D. $stm$ is used for integer arithmetic, while $exp$ is used for floating point.", explanation: "The distinction is based on whether a value is returned, not the data type of the calculation." }
      ],
      answer: 2
    },
    {
        question: "In the context of canonical trees, why must $CALL$ nodes be moved to the top level?",
        options: [
            { text: "A. Because $CALL$ nodes cannot have side effects in a canonical tree.", explanation: "CALL nodes are inherently side-effecting; moving them ensures those side effects are isolated and predictable." },
            { text: "B. Because the back end cannot generate assembly for nested function calls.", explanation: "Back ends can, but the IR is canonized to simplify evaluation order and register management for the back end." },
            { text: "C. Because multiple $CALL$s in one expression might overwrite the same return-value register.", explanation: "正确答案\nReal machines use a specific register (like RV) for return values; nested calls would conflict if not moved and their results saved." },
            { text: "D. Because $CALL$ nodes are too large to be children of BINOP nodes.", explanation: "The IR allows this nesting, but the physical implementation constraints of return registers make it problematic." }
        ],
        answer: 2
    },
    {
        question: "Which of the following describes a 'Canonical Tree' property?",
        options: [
            { text: "A. Every $MEM$ node is a child of a $BINOP$ node.", explanation: "$MEM$ nodes can appear in many locations, such as the source of a $MOVE$ or an argument to a $CALL$." },
            { text: "B. The tree uses physical register names instead of $TEMP$ labels.", explanation: "Canonization happens before register allocation, so it still utilizes abstract $TEMP$ nodes." },
            { text: "C. There are no $SEQ$ or $ESEQ$ nodes present in the tree.", explanation: "正确答案\nCanonization eliminates these nodes to create a clear, linear execution order where sub-expressions have no side effects." },
            { text: "D. The tree contains no $JUMP$ instructions, only $CJUMP$.", explanation: "Both $JUMP$ and $CJUMP$ are essential for control flow in canonical representations." }
        ],
        answer: 2
    },
    {
        question: "According to the $commute(s,e)$ test, which of the following is true?",
        options: [
            { text: "A. A statement 'definitely commutes' with a $CONST$ or $NAME$ expression.", explanation: "正确答案\nConstants and symbolic names do not change based on the state of memory or registers altered by a statement." },
            { text: "B. Two $MEM$ nodes always commute if they access different stack frames.", explanation: "The text states that we often cannot determine at compile time if memory accesses commute due to potential aliasing." },
            { text: "C. A $MOVE$ to a temporary never commutes with a $TEMP$ fetch.", explanation: "If they involve different temporaries, they can commute, but the naive test is conservative." },
            { text: "D. A $CALL$ node commutes with any $BINOP$ that does not involve memory.", explanation: "Calls are assumed to have arbitrary side effects and generally do not commute with other expressions in the naive test." }
        ],
        answer: 0
    },
    {
        question: "What is the defining characteristic of a 'Basic Block'?",
        options: [
            { text: "A. It starts with a $LABEL$, ends with a $JUMP$ or $CJUMP$, and has no internal labels or jumps.", explanation: "正确答案\nThis structure ensures that the block is a sequence of straight-line code that is always entered at the top and exited at the bottom." },
            { text: "B. It is a sequence of code that does not perform any memory operations.", explanation: "Basic blocks can and frequently do contain memory fetches (MEM) and stores (MOVE)." },
            { text: "C. It must be followed immediately by its own false destination label.", explanation: "This is a property of a 'trace' or a scheduled list of blocks, not a requirement of the basic block itself." },
            { text: "D. It contains a maximum of ten $stm$ nodes to ensure efficient optimization.", explanation: "Basic blocks can be of any length as long as they follow the entry/exit rules." }
        ],
        answer: 0
    },
    {
        question: "In the context of the compiler's back end, what is a 'Trace'?",
        options: [
            { text: "A. A list of all TEMP registers that are active across a function call.", explanation: "This refers to 'liveness analysis', not the trace-scheduling algorithm." },
            { text: "B. A debugging log that shows the evaluation order of BINOP nodes.", explanation: "While 'trace' can mean that in other contexts, here it refers to a specific ordering of basic blocks." },
            { text: "C. The path taken by the static link to reach a non-local variable.", explanation: "Static links are part of variable access, not the trace-scheduling process." },
            { text: "D. A sequence of basic blocks that could be consecutively executed.", explanation: "正确答案\nTraces are used to order basic blocks to minimize jumps and satisfy machine-level branch requirements." }
        ],
        answer: 3
    },
    {
        question: "How does the traceSchedule algorithm handle $CJUMP$ instructions to accommodate real machines?",
        options: [
            { text: "A. It replaces all $CJUMP$ nodes with a series of unconditional $JUMP$s and $LABEL$s.", explanation: "CJUMP is kept, but its surrounding blocks are reordered to meet fall-through requirements." },
            { text: "B. It ensures that the true label is always the target of a backward jump.", explanation: "The algorithm focuses on fall-through logic for the false branch, not the direction of the true jump." },
            { text: "C. It eliminates the false label entirely and uses a 'skip' count.", explanation: "Labels are maintained to ensure the control flow is preserved correctly."},
            { text: "D. It tries to ensure that the false label immediately follows the CJUMP.", explanation: "正确答案\nMost hardware conditional branches 'fall through' to the next instruction if the condition is false, so the IR must reflect this." }
        ],
        answer: 3
    }
  ]
};

// 动态构建界面
let globalCounter = 0;

// 1. 渲染判断题
quizData.trueFalse.forEach((q, i) => {
  const qDiv = buildMCQ(q, globalCounter, `T/F ${i+1}`);
  tfWrap.appendChild(qDiv);
  
  const btn = qDiv.querySelector(`#btn-${globalCounter}`);
  const currentCounter = globalCounter;
  btn.addEventListener('click', () => gradeQuestion(qDiv, currentCounter, btn));
  globalCounter++;
});

// 2. 渲染单选题
quizData.multipleChoice.forEach((q, i) => {
  const qDiv = buildMCQ(q, globalCounter, `Q${i+1}`);
  mcqWrap.appendChild(qDiv);
  
  const btn = qDiv.querySelector(`#btn-${globalCounter}`);
  const currentCounter = globalCounter;
  btn.addEventListener('click', () => gradeQuestion(qDiv, currentCounter, btn));
  globalCounter++;
});
</script>
</body>
</html>
